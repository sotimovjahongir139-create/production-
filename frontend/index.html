<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ishlab chiqarish nazorati</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== Login Screen ===== -->
  <div id="login-screen">
    <div class="login-card">
      <h1>Tizimga kirish</h1>
      <form id="login-form">
        <div class="form-group">
          <label for="username">Login</label>
          <input type="text" id="username" autocomplete="username" placeholder="admin" required />
        </div>
        <div class="form-group">
          <label for="password">Parol</label>
          <input type="password" id="password" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn-primary">Kirish</button>
        <div id="login-error" class="login-error"></div>
      </form>
    </div>
  </div>

  <!-- ===== App Screen ===== -->
  <div id="app-screen" style="display:none">

    <!-- Sidebar overlay (mobile) -->
    <div class="sidebar-overlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">Ishlab chiqarish<br>nazorati</div>
      <div class="sidebar-section-label">Ishlab chiqarish va ombor</div>
      <nav>
        <a href="#" data-module="cards">
          <span class="nav-icon">📋</span> Kartochkalar
        </a>
        <a href="#" data-module="products">
          <span class="nav-icon">📦</span> Mahsulot
        </a>
        <a href="#" data-module="sklad">
          <span class="nav-icon">🏭</span> Sklad
        </a>
        <a href="#" data-module="wip">
          <span class="nav-icon">🗂</span> Jarayonda
        </a>
      </nav>
      <div class="sidebar-footer">
        <button class="btn-logout" id="btn-logout">
          <span>⇦</span> Chiqish
        </button>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main-content">

      <!-- Mobile menu button -->
      <button class="mobile-menu-btn" id="mobile-menu-btn">☰</button>

      <!-- Error banner -->
      <div id="error-banner" class="error-banner" style="display:none">
        <span>⚠ Bazaga ulanib bo'lmadi</span>
        <button class="btn-retry" id="btn-retry">Qayta urinish</button>
      </div>

      <!-- Module header -->
      <div class="module-header">
        <div>
          <h2 class="module-title" id="module-title">Kartochkalar</h2>
          <div class="module-date" id="module-date"></div>
        </div>
        <div class="header-right">
          <span id="live-indicator" class="live-indicator" style="display:none"></span>
          <div class="period-buttons">
            <button class="btn-period" data-period="daily">Kunlik</button>
            <button class="btn-period" data-period="weekly">Haftalik</button>
            <button class="btn-period active" data-period="monthly">Oylik</button>
          </div>
        </div>
      </div>

      <!-- Dynamic content area -->
      <div id="module-content">
        <div class="state-msg">Yuklanmoqda...</div>
      </div>

    </main>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/wip.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Set current date in header
    const now = new Date();
    const dateStr = now.toLocaleDateString('uz-UZ', { year: 'numeric', month: 'long', day: 'numeric' });
    document.getElementById('module-date').textContent = dateStr;

    // Boot
    const loginForm = document.getElementById('login-form');
    loginForm.addEventListener('submit', AUTH.handleLogin);

    if (AUTH.isLoggedIn()) {
      AUTH.showApp();
    } else {
      AUTH.showLogin();
    }
  </script>
</body>
</html>
